---
version: "3"

services:
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - WEBUI_PORT=8070
    volumes:
      - qbittorrent-data:/config
      - /mnt/vault/data/torrents:/data
    ports:
      - 6881:6881/tcp
      - 6881:6881/udp
      - 8070:8070/tcp
    networks:
      - rn-net

volumes:
  qbittorrent-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /mnt/nfs/docker-volumes/qbittorrent-data

networks:
  rn-net: