---
version: "3"

services:
  portainer:
    image: linuxserver/jackett:latest
    container_name: jackett
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    volumes:
      - jackett-data:/config
      - data:/data
    ports:
      - 9117:9117/tcp
    networks:
      - rn-net

networks:
  rn-net:

volumes:
  jackett-data:
    driver: local
    driver_opts:
      type: nfs
      o: nfsvers=4,addr=10.10.30.31,rw,nolock,soft
      device: :/mnt/nfs/docker-volumes/jackett-data
  data:
      driver: local
      driver_opts:
        type: nfs
        o: nfsvers=4,addr=10.10.30.31,rw,nolock,soft
        device: :/mnt/vault/data