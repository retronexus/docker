---
version: "3"

services:
  homeassistant:
    image: linuxserver/homeasisstant:latest
    container_name: homeassistant
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    network_mode: host
    volumes:
      - homeassistant-data:/data
    ports:
      - 8123:8123

volumes:
  homeassistant-data:
    driver: local
    name: homeassistant-data
    driver_opts:
      type: nfs
      o: nfsvers=4,addr=10.10.30.31,rw,nolock,soft
      device: :/mnt/nfs/docker-volumes/andromedar/homeassistant-data
