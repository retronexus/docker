# DNS Settings

# Access control list
acl internal {
    10.10.0.0/16;
    10.10.30.12;
    10.10.70.1;
    10.10.70.2;
}

options {
    # Configure forwarder where outgoing DNS queries will be sent to
    forwarders {
        1.1.1.1; // Cloudflare DNS
        8.8.8.8; // Google DNS
    };
    
    # Allow queries from internal network
    allow-query { internal; }; 
    allow-query-cache { none; };
}