---
version: "3"

services:
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    volumes:
      - prowlarr-data:/config
      - media-data:/data
    ports:
      - 9696:9696/tcp
    networks:
      - rn-net

networks:
  rn-net:
    name: rn-net

volumes:
  prowlarr-data:
    name: prowlarr-data  
    driver: local
    driver_opts:
      type: nfs
      o: nfsvers=4,addr=10.10.30.31,rw,nolock,soft
      device: :/mnt/nfs/docker-volumes/orion/prowlarr-data

  media-data:
    name: media-data
    driver: local
    driver_opts:
      type: nfs
      o: nfsvers=4,addr=10.10.30.31,rw,nolock,soft
      device: :/mnt/vault/data